name: GitHub Metrics

on:
  schedule: [{ cron: "0 0 * * *" }]
  push: { branches: ["master", "main"] }
  workflow_dispatch:

jobs:
  # ── 1. Quadrant: Core Stats & Lines ──────────────────────────────
  stats-core:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-1.svg
          base: header, repositories, metadata
          plugin_lines: yes
          config_timezone: Europe/Istanbul

  # ── 2. Quadrant: Isometric Calendar ─────────────────────────────
  stats-calendar:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-2.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Europe/Istanbul

  # ── 3. Quadrant: Languages ──────────────────────────────────────
  stats-languages:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-3.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile, shell, makefile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6
          config_timezone: Europe/Istanbul

  # ── 4. Quadrant: Topics & Achievements ──────────────────────────
  stats-topics:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-4.svg
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_display: compact
          config_timezone: Europe/Istanbul
