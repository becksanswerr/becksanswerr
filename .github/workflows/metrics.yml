name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  metrics-left:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: becksanswerr
          template: classic
          base: header, metadata
          config_timezone: Europe/Istanbul
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          filename: github-metrics-left.svg
          config_output: svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "chore: update metrics [skip ci]"

  metrics-right:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: metrics-left
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: becksanswerr
          template: classic
          base: ""
          config_timezone: Europe/Istanbul
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile, shell, makefile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_limit: 6
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: no

          filename: github-metrics-right.svg
          config_output: svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "chore: update metrics [skip ci]"
