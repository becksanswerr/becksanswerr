name: GitHub Metrics

on:
  schedule: [{cron: "0 0 * * *"}]
  push: {branches: ["master", "main"]}
  workflow_dispatch:

jobs:
  # ── 1. Quadrant: Core Stats & Lines (Geçmiş tarama artırıldı) ──────
  stats-core:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-1.svg
          base: header, repositories, metadata
          plugin_lines: yes
          # Son 1 yıldaki satır değişimlerini tara
          plugin_lines_history_limit: 1
          config_timezone: Europe/Istanbul

  # ── 2. Quadrant: Isometric Calendar ─────────────────────────────
  stats-calendar:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-2.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Europe/Istanbul

  # ── 3. Quadrant: Languages ──────────────────────────────────────
  stats-languages:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-3.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile, shell, makefile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6
          config_timezone: Europe/Istanbul

  # ── 4. Quadrant: Notable & Achievements (Hata giderildi) ────────
  stats-notable:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-4.svg
          base: ""
          # Notable Plugin: Katkı sağladığın repo logolarını gösterir
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_types: commit, pull_request, issue
          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
          # Topics (Daha stabil mod)
          plugin_topics: yes
          plugin_topics_limit: 12
          plugin_topics_sort: stars
          config_timezone: Europe/Istanbul
